version: '3.8'

services:
  nuxt-app:
    build: .
    container_name: nuxt_preview
    networks:
      - scoobydoo
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - portfolio_data:/app/data
    restart: unless-stopped

networks:
  scoobydoo:
    external: true

volumes:
  portfolio_data:
